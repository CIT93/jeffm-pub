<!DOCTYPE html>
<!-- Declares the document type as HTML5 -->

<html lang="en">

<head>

<meta charset="UTF-8">
<!-- Ensures characters and symbols display correctly -->

<title>Item Cost Tracker</title>
<!-- Title shown in the browser tab -->

<!-- Link to the external CSS stylesheet -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Main heading of the page -->
<h1>Item Cost Tracker</h1>

<!-- Button the user clicks to add items -->
<!-- The ID must match the JavaScript: add-item-btn -->
<button id="add-item-btn">Add Item ($15)</button>
<!-- adding button --> 

<!-- Paragraph where JavaScript will display the total -->
<!-- The ID must match the JavaScript: total-display -->
<p id="total-display"></p>

<!-- Connects the HTML page to the JavaScript file -->
<script src="app.js"></script>

</body>

</html>
